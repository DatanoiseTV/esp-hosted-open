name: build

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

jobs:
  host-tests:
    name: host tests (no IDF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make -C tests/host test

  host-example:
    name: build P4 host example (SDIO)
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.5
    steps:
      - uses: actions/checkout@v4
      - name: idf.py build (esp32p4)
        working-directory: examples/host_p4_demo
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32p4
          idf.py build

  slave:
    name: slave (${{ matrix.chip }})
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.5
    strategy:
      fail-fast: false
      matrix:
        include:
          # ESP32-C5: Wi-Fi 6 + BLE, 2.4 + 5 GHz. The default target.
          - chip: esp32c5
            short: c5
            # boot at 0x2000, partition at 0xc000, app at 0x20000
            merge_args: >-
              0x2000 build/bootloader/bootloader.bin
              0xc000 build/partition_table/partition-table.bin
              0x16000 build/ota_data_initial.bin
              0x20000 build/network_adapter.bin
          # ESP32-C6: Wi-Fi 6 + BLE + 802.15.4 (Thread / Zigbee). 2.4 GHz only.
          # No 5 GHz so the 802.11p / V2X path is bench-only on this chip.
          - chip: esp32c6
            short: c6
            # boot at 0x0, partition at 0x8000, app at 0x10000 (different offsets!)
            merge_args: >-
              0x0 build/bootloader/bootloader.bin
              0x8000 build/partition_table/partition-table.bin
              0xd000 build/ota_data_initial.bin
              0x10000 build/network_adapter.bin
    steps:
      - uses: actions/checkout@v4
      - name: idf.py set-target ${{ matrix.chip }}
        working-directory: slave
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target ${{ matrix.chip }}
      - name: idf.py build
        working-directory: slave
        run: |
          . $IDF_PATH/export.sh
          idf.py build
      - name: merge image
        working-directory: slave
        run: |
          . $IDF_PATH/export.sh
          esptool --chip ${{ matrix.chip }} merge-bin \
            -o build/${{ matrix.short }}_slave_merged.bin \
            --flash-mode dio --flash-size 4MB --flash-freq 80m \
            ${{ matrix.merge_args }}
          shasum -a 256 build/${{ matrix.short }}_slave_merged.bin
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.short }}_slave_merged
          path: slave/build/${{ matrix.short }}_slave_merged.bin
          retention-days: 90
      - name: attach to release (tags only)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: slave/build/${{ matrix.short }}_slave_merged.bin

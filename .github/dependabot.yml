version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
    open-pull-requests-limit: 3
    groups:
      all-actions:
        patterns: ["*"]
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
